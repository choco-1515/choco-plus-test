{% extends "base.html" %}

{% block title %}トレンド - Choco-Tube{% endblock %}

{% block extra_head %}
<style>
    .region-selector {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .region-selector a {
        color: #aaa;
        text-decoration: none;
        padding: 5px 15px;
        border: 1px solid #333;
        border-radius: 20px;
        font-size: 0.9rem;
    }
    .region-selector a.active {
        background: #ff0000;
        color: #fff;
        border-color: #ff0000;
    }
</style>
{% endblock %}

{% block content %}
<div class="region-selector">
    <a href="/trend?region=JP" class="{{ 'active' if region == 'JP' }}">日本</a>
    <a href="/trend?region=US" class="{{ 'active' if region == 'US' }}">アメリカ</a>
    <a href="/trend?region=GB" class="{{ 'active' if region == 'GB' }}">イギリス</a>
    <a href="/trend?region=KR" class="{{ 'active' if region == 'KR' }}">韓国</a>
    <a href="/trend?region=DE" class="{{ 'active' if region == 'DE' }}">ドイツ</a>
    <a href="/trend?region=FR" class="{{ 'active' if region == 'FR' }}">フランス</a>
</div>

<div class="video-grid">
    {% for video in results %}
    <a href="/watch/{{ video.id }}" class="video-card">
        <img src="{{ video.thumbnail }}" alt="{{ video.title }}" loading="lazy">
        <div class="video-info">
            <h3>{{ video.title }}</h3>
            <p>{{ video.channel }}</p>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
